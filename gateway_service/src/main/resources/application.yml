server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: "optional:configserver:"

  cloud:
    consul:
      host: localhost
      discovery:
        service-name: gateway-service
    config:
      discovery:
        enabled: true
        service-id: config-service

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    prometheus:
      access: read_only